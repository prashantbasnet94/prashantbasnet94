<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <style>
    .type{clip-path:inset(-10% 102% -10% 0);animation:type steps(30,end) forwards}
    @keyframes type{to{clip-path:inset(-10% -2% -10% 0)}}
    .l1{animation-duration:.6s;animation-delay:.4s}
    .l2{animation-duration:.9s;animation-delay:1.2s}
    .l3{animation-duration:1.1s;animation-delay:2.0s}
    .l4{animation-duration:.8s;animation-delay:3.3s}
    .l5{animation-duration:1.2s;animation-delay:4.2s}
    .fade{opacity:0;animation:fadein .6s ease-out forwards}
    .c1{animation-delay:5.6s}.c2{animation-delay:5.8s}.c3{animation-delay:6s}.c4{animation-delay:6.2s}
    @keyframes fadein{to{opacity:1}}
    .blink{animation:blink 1.4s steps(1) infinite}
    @keyframes blink{50%{opacity:0.15}}
    .orbit{transform-origin:770px 225px;animation:spin 26s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
