    @keyframes hook{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
    .shoot{animation:shoot 7s linear infinite}
    @keyframes shoot{0%,88%{opacity:0;transform:translate(0,0)}90%{opacity:1}100%{opacity:0;transform:translate(-160px,60px)}}
    .jet{animation:jet 13s linear infinite}
    @keyframes jet{from{transform:translateX(-100px)}to{transform:translateX(1080px)}}
    .blink{animation:blink 1.6s steps(1) infinite}
    @keyframes blink{50%{opacity:0.15}}
  </style>
