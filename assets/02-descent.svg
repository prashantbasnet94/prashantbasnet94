  <style>
    .tw{animation:tw 3s ease-in-out infinite}
    .t1{animation-delay:-0.6s}.t2{animation-delay:-1.2s}.t3{animation-delay:-1.8s}.t4{animation-delay:-2.4s}
    @keyframes tw{0%,100%{opacity:0.15}50%{opacity:0.9}}
    .f0,.f1,.f2,.f3,.f4,.f5{animation:fl 2.6s ease-in-out infinite}
    .f1{animation-delay:-0.4s}.f2{animation-delay:-0.9s}.f3{animation-delay:-1.3s}.f4{animation-delay:-1.8s}.f5{animation-delay:-2.2s}
    @keyframes fl{0%,100%{opacity:0.5}50%{opacity:1}}
